<footer class="site-footer">
  <div class="container footer-inner">
    <p class="footer-copy">© {{ site.time | date: "%Y" }} {{ site.author.name }}</p>
    <div class="footer-links">
      {% if site.author.github %}
      <a href="https://github.com/{{ site.author.github }}" class="footer-link" target="_blank" rel="noopener">GitHub</a>
      {% endif %}
      {% if site.author.linkedin %}
      <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}" class="footer-link" target="_blank" rel="noopener">LinkedIn</a>
      {% endif %}
      {% if site.author.email %}
      <a href="mailto:{{ site.author.email }}" class="footer-link">{{ site.author.email }}</a>
      {% endif %}
      {% if site.author.phone %}
      <a href="tel:{{ site.author.phone }}" class="footer-link">{{ site.author.phone }}</a>
      {% endif %}
    </div>
  </div>
</footer>
